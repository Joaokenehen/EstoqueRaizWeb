events {
    worker_connections 1024;
}

http {
   
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=relatorios_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ==================== logs ====================
    log_format microservices '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'upstream: $upstream_addr '
                           'request_time: $request_time '
                           'upstream_response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log microservices;
    error_log /var/log/nginx/error.log warn;

    # ==================== cache ====================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m;

    server {
        listen 8081;
        server_name localhost;
        
        client_max_body_size 10m;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        limit_conn conn_limit 20;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ==================== health check ====================
        location /health {
            access_log off;
            return 200 "Gateway Online\n";
            add_header Content-Type text/plain;
        }

        # ==================== auth service ====================
        location /api/auth {
            # --- CORS ---
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            # ------------

            limit_req zone=auth_limit burst=20 nodelay;
            limit_req_status 429;
            
            set $auth_upstream auth-service:3001;
            proxy_pass http://$auth_upstream;
            add_header X-Service "auth-service" always;
            add_header X-Response-Time $request_time always;
        }

        # ==================== usuarios service ====================
        location /api/usuarios {
            # --- CORS ---
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            # ------------

            limit_req zone=api_limit burst=50 nodelay;
            
            set $usuarios_upstream usuarios-service:3002;
            proxy_pass http://$usuarios_upstream;

            # evitar cache no gateway para dados dinâmicos de usuário sensível a mudanças
            # proxy_cache api_cache;
            # proxy_cache_valid 200 30s;
            # proxy_cache_methods GET;
            # proxy_cache_key "$request_uri|$request_body";
            # proxy_cache_bypass $http_cache_control;
            # proxy_no_cache $http_cache_control;
            # add_header X-Cache-Status $upstream_cache_status;

            add_header X-Service "usuarios-service" always;
            add_header X-Response-Time $request_time always;
        }

